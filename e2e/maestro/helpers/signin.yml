# Reusable sign-in helper.
#
# Maestro runs each flow in `maestro test .` from a fresh state, so flows
# that need an authenticated session must drive the PAT sign-in themselves.
# Included from 03-note-crud and 04-sync via `runFlow:`.
appId: com.notekit.app
---
- launchApp:
    clearState: false
    clearKeychain: false

- assertVisible: "Sign in with token"
- tapOn: "Sign in with token"

- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    text: "nkp_…"

- runScript:
    file: ../../scripts/read-pat.js

- inputText: ${output.pat}
- hideKeyboard

- tapOn:
    text: "Sign in"

# The form's window.location.reload() leaves the WKWebView blank
# intermittently on iOS (separate bug). A clean stopApp + launchApp pair
# re-reads the PAT from localStorage on cold launch and renders the App
# reliably.
- stopApp
- launchApp

- waitForAnimationToEnd:
    timeout: 5000

- extendedWaitUntil:
    visible: "Notes"
    timeout: 20000
