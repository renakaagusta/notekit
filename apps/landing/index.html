<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NoteKit — Notes &amp; tickets in your Git repo</title>
    <meta
      name="description"
      content="NoteKit keeps your notes, tickets, and links as plain Markdown in a Git repo you own. Open source, end-to-end encrypted, no lock-in."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%23ea7317'/%3E%3Cpath d='M16.5 4.5 7 19.5' stroke='white' stroke-width='3.2' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <meta property="og:title" content="NoteKit" />
    <meta property="og:description" content="Notes & tickets in your Git repo." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://notekit.online" />
    <style>
      :root {
        --ink: #1c1917;
        --muted: #78716c;
        --line: #e7e5e4;
        --brand: #ea7317;
        --bg: #fafaf9;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto,
          Helvetica, Arial, sans-serif;
        color: var(--ink);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 20px;
      }
      .card {
        width: 100%;
        max-width: 460px;
        text-align: center;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }
      .mark {
        width: 44px;
        height: 44px;
        border-radius: 11px;
        background: var(--brand);
        display: grid;
        place-items: center;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
      }
      .mark svg { display: block; }
      .word { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
      .word .slash { color: var(--brand); }
      h1 {
        font-size: 21px;
        font-weight: 600;
        margin: 0 0 10px;
        letter-spacing: -0.01em;
      }
      p.lead {
        font-size: 16px;
        line-height: 1.55;
        color: var(--muted);
        margin: 0 auto 28px;
        max-width: 380px;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        max-width: 300px;
        padding: 13px 20px;
        border-radius: 11px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        transition: transform 0.04s ease, background 0.15s ease, border-color 0.15s ease;
      }
      .btn:active { transform: translateY(1px); }
      .btn-primary { background: var(--brand); color: #fff; }
      .btn-primary:hover { background: #d2660f; }
      .btn-ghost {
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--line);
      }
      .btn-ghost:hover { border-color: #d6d3d1; }
      footer {
        text-align: center;
        padding: 20px;
        font-size: 13px;
        color: var(--muted);
      }
      footer a { color: var(--muted); }
      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #f5f5f4;
          --muted: #a8a29e;
          --line: #292524;
          --bg: #1c1917;
        }
        .btn-ghost { background: #292524; }
        .btn-ghost:hover { border-color: #44403c; }
        .mark { box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4); }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="logo">
          <span class="mark" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path
                d="M16.5 4.5 7 19.5"
                stroke="#fff"
                stroke-width="3.2"
                stroke-linecap="round"
              />
            </svg>
          </span>
          <span class="word">note<span class="slash">/</span>kit</span>
        </div>

        <h1>Notes &amp; tickets in your Git repo.</h1>
        <p class="lead">
          Plain Markdown, end-to-end encrypted, in a repo you own. Open source,
          no lock-in. The full landing page is on its way.
        </p>

        <div class="actions">
          <a class="btn btn-primary" href="https://app.notekit.online">Open the app →</a>
          <a class="btn btn-ghost" href="https://github.com/renakaagusta/notekit">View on GitHub</a>
        </div>
      </div>
    </main>
    <footer>© NoteKit · <a href="https://app.notekit.online">app.notekit.online</a></footer>
  </body>
</html>
