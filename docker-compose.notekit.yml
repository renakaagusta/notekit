services:
  # Marketing/landing page on the apex (notekit.online + www). Also the
  # natural home of the wildcard cert request (main=notekit.online,
  # sans=*.notekit.online) which covers every other router below.
  notekit-landing:
    image: notekit-landing:latest
    container_name: notekit-landing
    restart: unless-stopped
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=infrastructure"
      - "traefik.http.services.notekit-landing.loadbalancer.server.port=80"
      - "traefik.http.middlewares.notekit-compress.compress=true"
      - "traefik.http.routers.notekit-landing.rule=Host(`${ROOT_DOMAIN}`) || Host(`www.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.notekit-landing.entrypoints=websecure"
      - "traefik.http.routers.notekit-landing.tls.certresolver=cloudflare"
      - "traefik.http.routers.notekit-landing.tls.domains[0].main=${ROOT_DOMAIN}"
      - "traefik.http.routers.notekit-landing.tls.domains[0].sans=*.${ROOT_DOMAIN}"
      - "traefik.http.routers.notekit-landing.service=notekit-landing"
      - "traefik.http.routers.notekit-landing.middlewares=notekit-compress"
      - "traefik.http.routers.notekit-landing.priority=10"

  notekit-web:
    image: notekit-web:latest
    container_name: notekit-web
    restart: unless-stopped
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=infrastructure"
      - "traefik.http.services.notekit-web.loadbalancer.server.port=80"
      - "traefik.http.routers.notekit-web.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.notekit-web.entrypoints=websecure"
      - "traefik.http.routers.notekit-web.tls.certresolver=cloudflare"
      - "traefik.http.routers.notekit-web.service=notekit-web"
      - "traefik.http.routers.notekit-web.middlewares=notekit-compress"
      - "traefik.http.routers.notekit-web.priority=10"

  notekit-api:
    image: notekit-api:latest
    container_name: notekit-api
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      WEB_URL: https://${WEB_DOMAIN}
      API_URL: https://${API_DOMAIN}
      # Allow the Capacitor native WebView origins (iOS: capacitor://localhost,
      # Android: https://localhost) to call the API — without this the mobile
      # app is CORS-blocked and every request fails with a network error.
      CORS_EXTRA_ORIGINS: "capacitor://localhost,https://localhost"
      SESSION_SECRET: ${SESSION_SECRET}
      DATABASE_URL: file:./data/notekit.db
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-}
      APPLE_ISSUER_ID: ${APPLE_ISSUER_ID:-}
      APPLE_API_KEY_ID: ${APPLE_API_KEY_ID:-}
      APPLE_API_KEY_P8: ${APPLE_API_KEY_P8:-}
      APPLE_SHARED_SECRET: ${APPLE_SHARED_SECRET:-}
      # Sign in with Apple (web OAuth) — distinct from the App Store Connect keys above
      APPLE_AUTH_SERVICE_ID: ${APPLE_AUTH_SERVICE_ID:-}
      APPLE_AUTH_NATIVE_APP_ID: ${APPLE_AUTH_NATIVE_APP_ID:-}
      APPLE_AUTH_TEAM_ID: ${APPLE_AUTH_TEAM_ID:-}
      APPLE_AUTH_KEY_ID: ${APPLE_AUTH_KEY_ID:-}
      APPLE_AUTH_PRIVATE_KEY: ${APPLE_AUTH_PRIVATE_KEY:-}
      GOOGLE_PLAY_PACKAGE_NAME: ${GOOGLE_PLAY_PACKAGE_NAME:-}
      GOOGLE_PLAY_CLIENT_EMAIL: ${GOOGLE_PLAY_CLIENT_EMAIL:-}
      GOOGLE_PLAY_PRIVATE_KEY: ${GOOGLE_PLAY_PRIVATE_KEY:-}
      GOOGLE_PLAY_PUBSUB_SECRET: ${GOOGLE_PLAY_PUBSUB_SECRET:-}
      FORGEJO_URL: https://${GIT_DOMAIN}
      FORGEJO_DOMAIN: ${GIT_DOMAIN}
      FORGEJO_ADMIN_TOKEN: ${FORGEJO_ADMIN_TOKEN:-}
      AGENT_EMAIL_DOMAIN: ${AGENT_EMAIL_DOMAIN:-agents.notekit.app}
    volumes:
      - notekit-db:/app/apps/api/data
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=infrastructure"
      - "traefik.http.services.notekit-api-svc.loadbalancer.server.port=3001"
      - "traefik.http.routers.notekit-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.notekit-api.entrypoints=websecure"
      - "traefik.http.routers.notekit-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.notekit-api.service=notekit-api-svc"
      - "traefik.http.routers.notekit-api.priority=10"

  notekit-git:
    image: codeberg.org/forgejo/forgejo:10
    container_name: notekit-git
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      FORGEJO__server__DOMAIN: ${GIT_DOMAIN}
      FORGEJO__server__HTTP_PORT: 3000
      FORGEJO__server__ROOT_URL: https://${GIT_DOMAIN}/
      FORGEJO__server__SSH_DOMAIN: ${GIT_DOMAIN}
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__database__PATH: /data/gitea/gitea.db
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__service__REQUIRE_SIGNIN_VIEW: "false"
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__security__SECRET_KEY: ${FORGEJO_SECRET_KEY}
      FORGEJO__security__INTERNAL_TOKEN: ${FORGEJO_INTERNAL_TOKEN}
      FORGEJO__log__LEVEL: Warn
      FORGEJO__admin__DEFAULT_EMAIL_NOTIFICATIONS: disabled
      # Federated avatars: instead of Gravatar.com (which knows nothing
      # about our agents), Forgejo queries NoteKit's `/avatar/:hash`
      # endpoint for any unknown email. Agent-authored commits then
      # render with the agent's own avatar in Forgejo's UI, no extra
      # setup per agent. Real Forgejo users keep their own profile pic
      # since Forgejo checks local users before falling back.
      FORGEJO__picture__DISABLE_GRAVATAR: "false"
      FORGEJO__picture__GRAVATAR_SOURCE: https://${API_DOMAIN}/avatar/
      FORGEJO__picture__ENABLE_FEDERATED_AVATAR: "true"
    volumes:
      - notekit-git-data:/data
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=infrastructure"
      - "traefik.http.services.notekit-git.loadbalancer.server.port=3000"
      - "traefik.http.routers.notekit-git.rule=Host(`${GIT_DOMAIN}`)"
      - "traefik.http.routers.notekit-git.entrypoints=websecure"
      - "traefik.http.routers.notekit-git.tls.certresolver=cloudflare"
      - "traefik.http.routers.notekit-git.service=notekit-git"
      - "traefik.http.routers.notekit-git.priority=10"

volumes:
  notekit-db:
  notekit-git-data:

networks:
  infrastructure:
    external: true
