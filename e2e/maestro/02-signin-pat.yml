# 02 — Sign in with PAT
#
# Drives the mobile-only PAT path. The token is read via runScript from
# the E2E_PAT env var. After submit the app reloads, the API client picks
# up bearer mode at module init, and the AuthGate flips from `anonymous`
# to `authenticated`.
appId: com.notekit.app
tags:
  - auth
---
- launchApp:
    clearState: false
    clearKeychain: false

- assertVisible: "Sign in with token"
- tapOn: "Sign in with token"

# Wait for React state to commit + form to render.
- waitForAnimationToEnd:
    timeout: 3000

# The placeholder text "nkp_…" lets Maestro locate the input reliably
# (Capacitor's WebView exposes placeholders as accessible text).
- tapOn:
    text: "nkp_…"

# Pull the PAT through Maestro's JS sandbox to dodge a 2.1.0 quirk where
# `${ENV_VAR}` inside `inputText` was passed through verbatim.
- runScript:
    file: ../scripts/read-pat.js

- inputText: ${output.pat}
- hideKeyboard

- tapOn:
    text: "Sign in"

# The form's window.location.reload() leaves the WKWebView blank
# intermittently on iOS (separate bug). A stopApp + launchApp pair
# re-reads the PAT from localStorage on cold launch and renders the App
# reliably; bearer mode then activates at module init.
- stopApp
- launchApp

# Brief wait for the app-switcher transition to clear before asserting —
# Maestro's screenshots otherwise catch the iOS multitasking carousel
# mid-animation and the timeout starts before the WebView has loaded.
- waitForAnimationToEnd:
    timeout: 5000

# Post-launch the bearer-mode client hits /auth/me with the PAT; AuthGate
# flips to the App shell. The mobile header renders the "Notes" title —
# more stable than the empty-state copy.
- extendedWaitUntil:
    visible: "Notes"
    timeout: 20000

- takeScreenshot: ../artifacts/02-signin-pat
